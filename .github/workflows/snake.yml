Step 1: Masuk ke repo special lu
Buka: https://github.com/codeNAMEzerro/codeNAMEzerro

Step 2: Bikin GitHub Action workflow
Klik tab Actions (di atas, sebelah Issues/Pull Requests)
Kalo ada notif "Get started with GitHub Actions" → scroll ke bawah, klik set up a workflow yourself (link kecil)
Kalo ngga ada notif → klik tombol hijau New workflow → klik set up a workflow yourself
Step 3: Edit file workflow
Di atas editor, ganti nama file dari main.yml jadi:

snake.yml
Hapus semua isi default, terus paste kode ini:

name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: codeNAMEzerro
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#00ffff&color_dots=#0d1117,#ff00ff,#00ffff,#ffffff,#ff00ff

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
